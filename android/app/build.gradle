plugins {
    id 'com.android.application'
}

android {
    namespace 'org.cochranblock.whyyoulying'
    compileSdk 35

    defaultConfig {
        applicationId "org.cochranblock.whyyoulying"
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName "0.2.0"
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}
